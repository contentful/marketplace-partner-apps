---
name: 'New App Review'

"on":
  pull_request:
    types:
      - opened
      - edited
      - synchronize
    branches:
      - 'main'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  main:
    name: New App Review
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch all history for all branches and tags
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Compile TypeScript
        # compilation is necessary because github-script does not support ts
        # https://github.com/actions/github-script/issues/294
        run: npx tsc --project .github/workflows/tsconfig.json
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { review } = require(
              './.github/workflows/dist/new-app-review'
            );
            const { chdir, cwd } = require('node:process');
            chdir(cwd());
            await review({
              github,
              ctx: context,
              ghCore: core
            });
