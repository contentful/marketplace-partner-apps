---
name: 'release-please dependency-only auto-merge'

'on':
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  auto-merge-dependency-releases:
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    runs-on: ubuntu-latest
    # Only run on Release Please PRs with "chore: release" title
    if: |
      github.actor == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.title, 'chore: release')
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Check if release contains only dependency updates
        id: check-dependencies
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const body = context.payload.pull_request.body ?? '';

            const hasNonDependencySections = /### (Features|Performance Improvements|Reverts|Documentation)/i.test(body);
            const hasBreakingChanges = /BREAKING CHANGE/i.test(body);
            const hasDependencyEntries = /\*\*deps\*\*:/i.test(body);

            if (hasNonDependencySections) {
              console.log('Found non-dependency sections, skipping auto-merge');
              core.setOutput('is-dependency-only', 'false');
              return;
            }

            if (hasBreakingChanges) {
              console.log('Found breaking changes, skipping auto-merge');
              core.setOutput('is-dependency-only', 'false');
              return;
            }

            if (hasDependencyEntries) {
              console.log('Found dependency updates, proceeding with auto-merge');
              core.setOutput('is-dependency-only', 'true');
              return;
            }

            console.log('No dependency updates found, skipping auto-merge');
            core.setOutput('is-dependency-only', 'false');

      - name: Retrieve github token
        if: |
          steps.check-dependencies.outputs.is-dependency-only == 'true' &&
          github.event.pull_request.head.repo.fork != true
        id: vault
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_URL }}
          role: ${{ github.event.repository.name }}-github-action
          method: jwt
          path: github-actions
          exportEnv: false
          secrets: |
            github/token/${{ github.event.repository.name }}-dependabot token | GITHUB_MERGE_TOKEN ;

      - name: Approve PR
        if: |
          steps.check-dependencies.outputs.is-dependency-only == 'true' &&
          github.event.pull_request.head.repo.fork != true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ steps.vault.outputs.GITHUB_MERGE_TOKEN }}
          script: |
            const opts = github.rest.pulls.listReviews.endpoint.merge({
              pull_number: context.payload.pull_request.number,
              owner: context.payload.repository.owner.login,
              repo: context.payload.repository.name,
            });

            const reviews = await github.paginate(opts);

            const ourReview = reviews.find(
              (review) =>
                review.state === "APPROVED" && review.user && review.user.login === "contentful-automation[bot]"
            );

            if (ourReview) {
              console.log(
                `The user "${ourReview.user.login}" has already approved and requested this PR is merged, exiting`
              );
            } else {
              await github.rest.pulls.createReview({
                owner: context.payload.repository.owner.login,
                repo: context.payload.repository.name,
                pull_number: context.payload.pull_request.number,
                event: 'APPROVE',
                body: 'Auto-approving dependency-only release'
              });
            }

      - name: Enable auto merge
        if: |
          steps.check-dependencies.outputs.is-dependency-only == 'true' &&
          github.event.pull_request.head.repo.fork != true
        shell: bash
        env:
          GH_TOKEN: ${{ steps.vault.outputs.GITHUB_MERGE_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Auto merging dependency-only release PR"
          gh pr merge --auto "$PR_NUMBER"
