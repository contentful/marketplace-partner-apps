<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ContentGraph app layers diagram</title>
  <desc id="desc">A presentation-ready diagram showing a Contentful entry moving through four app layers: signal detection, company enrichment, AI classification, and quality overrides, before publishing classified taxonomy fields.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="navyGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f7cff"/>
      <stop offset="100%" stop-color="#1d94ff"/>
    </linearGradient>
    <linearGradient id="cyanGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c3ff"/>
      <stop offset="100%" stop-color="#7adfff"/>
    </linearGradient>
    <linearGradient id="tealGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0689ff"/>
      <stop offset="100%" stop-color="#18c4d8"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#11b981"/>
      <stop offset="100%" stop-color="#24d39a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .eyebrow { font: 700 20px 'Inter', 'Segoe UI', Arial, sans-serif; letter-spacing: 0.18em; fill: #0f7cff; }
      .title { font: 700 44px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 22px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #425466; }
      .sectionLabel { font: 700 18px 'Inter', 'Segoe UI', Arial, sans-serif; letter-spacing: 0.08em; fill: rgba(255,255,255,0.86); }
      .sectionLabelDark { font: 700 18px 'Inter', 'Segoe UI', Arial, sans-serif; letter-spacing: 0.08em; fill: #0f5ecf; }
      .cardTitleLight { font: 700 30px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .cardTitleDark { font: 700 30px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .cardBodyLight { font: 500 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: rgba(255,255,255,0.92); }
      .cardBodyDark { font: 500 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #16415f; }
      .pillTextLight { font: 600 16px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .pillTextDark { font: 600 16px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .metricLabel { font: 700 16px 'Inter', 'Segoe UI', Arial, sans-serif; letter-spacing: 0.08em; fill: rgba(255,255,255,0.7); }
      .metricValue { font: 700 26px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .footnote { font: 500 16px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #5f6b7b; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGradient)"/>
  <circle cx="126" cy="118" r="240" fill="#22c3ff" opacity="0.10"/>
  <circle cx="1470" cy="780" r="260" fill="#0f7cff" opacity="0.08"/>
  <circle cx="1380" cy="140" r="180" fill="#11b981" opacity="0.06"/>

  <g transform="translate(110 82)">
    <text class="eyebrow">CONTENTGRAPH IN CONTENTFUL</text>
    <text y="56" class="title">How the app works from entry to taxonomy</text>
    <text y="95" class="subtitle">Deterministic signals first, AI classification in the middle, quality controls before publish.</text>
  </g>

  <g transform="translate(120 168)" filter="url(#softShadow)">
    <rect width="1360" height="92" rx="28" fill="url(#navyGradient)"/>
    <rect x="28" y="24" width="104" height="44" rx="22" fill="rgba(255,255,255,0.14)"/>
    <text x="48" y="52" class="sectionLabel">INPUT</text>
    <text x="170" y="54" class="cardTitleLight">Contentful Entry</text>
    <text x="170" y="82" class="cardBodyLight">Editor clicks Classify to start the workflow inside Contentful.</text>
    <rect x="1104" y="24" width="228" height="44" rx="22" fill="rgba(255,255,255,0.12)"/>
    <text x="1144" y="52" class="pillTextLight">Native editor workflow</text>
  </g>

  <g transform="translate(800 274)">
    <line x1="0" y1="0" x2="0" y2="22" stroke="#9dc7ff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="11" r="8" fill="#0f7cff"/>
  </g>

  <g transform="translate(120 304)" filter="url(#softShadow)">
    <rect width="1360" height="100" rx="30" fill="url(#blueGradient)"/>
    <rect x="28" y="26" width="132" height="48" rx="24" fill="rgba(255,255,255,0.16)"/>
    <text x="54" y="56" class="sectionLabel">LAYER 1</text>
    <text x="196" y="54" class="cardTitleLight">Signal Detection</text>
    <text x="196" y="82" class="cardBodyLight">URL patterns, CTAs, page structure, and language cues establish the first hard signals.</text>
    <g transform="translate(900 24)">
      <rect width="154" height="40" rx="20" fill="rgba(255,255,255,0.14)"/>
      <text x="28" y="25" class="pillTextLight">URL patterns</text>
    </g>
    <g transform="translate(1068 24)">
      <rect width="112" height="40" rx="20" fill="rgba(255,255,255,0.14)"/>
      <text x="42" y="25" class="pillTextLight">CTAs</text>
    </g>
    <g transform="translate(1194 24)">
      <rect width="134" height="40" rx="20" fill="rgba(255,255,255,0.14)"/>
      <text x="28" y="25" class="pillTextLight">Structure</text>
    </g>
    <g transform="translate(982 68)">
      <rect width="124" height="40" rx="20" fill="rgba(255,255,255,0.14)"/>
      <text x="29" y="25" class="pillTextLight">Language</text>
    </g>
  </g>

  <g transform="translate(800 408)">
    <line x1="0" y1="0" x2="0" y2="22" stroke="#7adfff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="11" r="8" fill="#22c3ff"/>
  </g>

  <g transform="translate(120 438)" filter="url(#softShadow)">
    <rect width="1360" height="100" rx="30" fill="url(#cyanGradient)"/>
    <rect x="28" y="26" width="132" height="48" rx="24" fill="rgba(255,255,255,0.56)"/>
    <text x="54" y="56" class="sectionLabelDark">LAYER 2</text>
    <text x="196" y="54" class="cardTitleDark">Company Enrichment</text>
    <text x="196" y="82" class="cardBodyDark">Brand extraction and industry mapping add commercial context before the model decides anything subjective.</text>
    <g transform="translate(870 24)">
      <rect width="168" height="40" rx="20" fill="rgba(255,255,255,0.58)"/>
      <text x="25" y="25" class="pillTextDark">Brand extraction</text>
    </g>
    <g transform="translate(1052 24)">
      <rect width="160" height="40" rx="20" fill="rgba(255,255,255,0.58)"/>
      <text x="28" y="25" class="pillTextDark">Industry mapping</text>
    </g>
    <g transform="translate(948 68)">
      <rect width="146" height="40" rx="20" fill="rgba(255,255,255,0.58)"/>
      <text x="30" y="25" class="pillTextDark">Company hints</text>
    </g>
  </g>

  <g transform="translate(800 542)">
    <line x1="0" y1="0" x2="0" y2="22" stroke="#40c9ec" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="11" r="8" fill="#14a5e6"/>
  </g>

  <g transform="translate(120 572)" filter="url(#softShadow)">
    <rect width="1360" height="100" rx="30" fill="url(#tealGradient)"/>
    <rect x="28" y="26" width="132" height="48" rx="24" fill="rgba(255,255,255,0.16)"/>
    <text x="54" y="56" class="sectionLabel">LAYER 3</text>
    <text x="196" y="54" class="cardTitleLight">AI Classification</text>
    <text x="196" y="82" class="cardBodyLight">Gemini classifies 12 fields and returns confidence scores using the entry content plus prior signals.</text>
    <g transform="translate(920 24)">
      <rect width="108" height="40" rx="20" fill="rgba(255,255,255,0.14)"/>
      <text x="31" y="25" class="pillTextLight">Gemini</text>
    </g>
    <g transform="translate(1042 24)">
      <rect width="144" height="40" rx="20" fill="rgba(255,255,255,0.14)"/>
      <text x="23" y="25" class="pillTextLight">12 fields</text>
    </g>
    <g transform="translate(1200 24)">
      <rect width="128" height="40" rx="20" fill="rgba(255,255,255,0.14)"/>
      <text x="17" y="25" class="pillTextLight">Confidence</text>
    </g>
  </g>

  <g transform="translate(800 676)">
    <line x1="0" y1="0" x2="0" y2="22" stroke="#33d0a0" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="11" r="8" fill="#11b981"/>
  </g>

  <g transform="translate(120 706)" filter="url(#softShadow)">
    <rect width="1360" height="100" rx="30" fill="url(#greenGradient)"/>
    <rect x="28" y="26" width="132" height="48" rx="24" fill="rgba(255,255,255,0.16)"/>
    <text x="54" y="56" class="sectionLabel">LAYER 4</text>
    <text x="196" y="54" class="cardTitleLight">Quality Overrides</text>
    <text x="196" y="82" class="cardBodyLight">Human corrections and business rules catch edge cases before final write-back to taxonomy.</text>
    <g transform="translate(870 24)">
      <rect width="170" height="40" rx="20" fill="rgba(255,255,255,0.14)"/>
      <text x="18" y="25" class="pillTextLight">Human corrections</text>
    </g>
    <g transform="translate(1054 24)">
      <rect width="148" height="40" rx="20" fill="rgba(255,255,255,0.14)"/>
      <text x="22" y="25" class="pillTextLight">Business rules</text>
    </g>
    <g transform="translate(1216 24)">
      <rect width="112" height="40" rx="20" fill="rgba(255,255,255,0.14)"/>
      <text x="21" y="25" class="pillTextLight">Review gate</text>
    </g>
  </g>

  <g transform="translate(800 810)">
    <line x1="0" y1="0" x2="0" y2="18" stroke="#58c8ff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="9" r="8" fill="#0f7cff"/>
  </g>

  <g transform="translate(120 826)" filter="url(#softShadow)">
    <rect width="1360" height="54" rx="27" fill="url(#navyGradient)"/>
    <text x="32" y="34" class="metricLabel">OUTPUT</text>
    <g transform="translate(170 7)">
      <rect width="250" height="40" rx="20" fill="rgba(255,255,255,0.12)"/>
      <text x="27" y="27" class="metricValue">12 classified fields</text>
    </g>
    <g transform="translate(438 7)">
      <rect width="218" height="40" rx="20" fill="rgba(34,195,255,0.20)"/>
      <text x="48" y="27" class="metricValue">98% accuracy</text>
    </g>
    <g transform="translate(674 7)">
      <rect width="278" height="40" rx="20" fill="rgba(17,185,129,0.20)"/>
      <text x="23" y="27" class="metricValue">Published to taxonomy</text>
    </g>
    <g transform="translate(982 7)">
      <rect width="112" height="40" rx="20" fill="rgba(255,255,255,0.12)"/>
      <text x="23" y="26" class="pillTextLight">Topic</text>
    </g>
    <g transform="translate(1108 7)">
      <rect width="112" height="40" rx="20" fill="rgba(255,255,255,0.12)"/>
      <text x="23" y="26" class="pillTextLight">Intent</text>
    </g>
    <g transform="translate(1234 7)">
      <rect width="96" height="40" rx="20" fill="rgba(255,255,255,0.12)"/>
      <text x="19" y="26" class="pillTextLight">Persona</text>
    </g>
  </g>

  <text x="120" y="894" class="footnote">Low-confidence results can still be routed to review before final taxonomy publish.</text>
</svg>
