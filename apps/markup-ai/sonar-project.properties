sonar.projectKey=markupai_contentful-app
sonar.organization=markupai
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=./coverage/lcov.info
# The three trailing entries (FieldCheckDialog / EditorPanel / IssueHighlights)
# are integration-heavy: FieldCheckDialog orchestrates the Contentful SDK +
# scan hook + editor + sidebar, EditorPanel embeds a TipTap/ProseMirror editor
# instance, and IssueHighlights is a ProseMirror plugin whose pure logic
# (offset translation, decoration building) is already covered separately by
# `mapping.spec.ts` and `decorations.spec.ts`. They require an end-to-end
# harness to unit-test in isolation; covering them is tracked as a follow-up
# rather than blocking this PR.
sonar.coverage.exclusions=test/**, **/*.spec.ts, **/*.spec.tsx, **/*.test.ts, **/*.test.tsx, scripts/**, vitest.config.ts, vite.config.ts, src/setupTests.ts, src/locations/Dialog/FieldCheckDialog.tsx, src/locations/Dialog/FieldCheck/components/EditorPanel/EditorPanel.tsx, src/locations/Dialog/FieldCheck/components/IssueHighlights/IssueHighlights.ts
sonar.exclusions=src/api-client/**
